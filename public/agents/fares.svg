<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-f" cx="46%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#181828"/>
      <stop offset="55%" stop-color="#0e0e20"/>
      <stop offset="100%" stop-color="#060612"/>
    </radialGradient>
    <radialGradient id="skin-f" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#c89060"/>
      <stop offset="100%" stop-color="#9c6430"/>
    </radialGradient>
    <linearGradient id="body-f" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#080814"/>
    </linearGradient>
    <linearGradient id="hair-f" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e0a06"/>
      <stop offset="100%" stop-color="#060406"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg-f)"/>
  <ellipse cx="190" cy="110" rx="300" ry="205" fill="rgba(99,102,241,0.08)"/>
  <!-- body / suit -->
  <path d="M 0 512 C 25 398 100 354 170 342 Q 212 335 256 335 Q 300 335 342 342 C 412 354 487 398 512 512 Z" fill="url(#body-f)"/>
  <!-- shirt collar visible -->
  <path d="M 234 342 L 256 370 L 278 342 L 296 348 Q 278 380 256 395 Q 234 380 216 348 Z" fill="#1e2030"/>
  <path d="M 234 342 L 256 370 L 256 395 Q 244 382 234 342 Z" fill="#e8dcc0" opacity="0.85"/>
  <path d="M 278 342 L 256 370 L 256 395 Q 268 382 278 342 Z" fill="#e8dcc0" opacity="0.85"/>
  <!-- neck -->
  <path d="M 234 296 Q 230 320 228 342 Q 242 350 256 351 Q 270 350 284 342 Q 282 320 278 296 Z" fill="url(#skin-f)"/>
  <!-- face -->
  <ellipse cx="256" cy="248" rx="82" ry="90" fill="url(#skin-f)"/>
  <!-- hair (short, dark) -->
  <ellipse cx="256" cy="176" rx="84" ry="50" fill="url(#hair-f)"/>
  <path d="M 172 224 C 168 190 176 158 200 148 Q 228 138 256 138 Q 284 138 312 148 C 336 158 344 190 340 224 C 320 196 300 186 256 185 C 212 186 192 196 172 224 Z" fill="url(#hair-f)"/>
  <!-- sideburns/beard shadow -->
  <path d="M 174 244 C 172 268 176 290 185 308 C 190 280 194 260 174 244 Z" fill="rgba(0,0,0,0.20)"/>
  <path d="M 338 244 C 340 268 336 290 327 308 C 322 280 318 260 338 244 Z" fill="rgba(0,0,0,0.20)"/>
  <!-- eyebrows (thick, masculine) -->
  <path d="M 207 222 Q 224 214 242 220" stroke="#0e0804" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 270 220 Q 288 214 305 222" stroke="#0e0804" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- left eye -->
  <ellipse cx="226" cy="238" rx="17" ry="10.5" fill="#e8e0d8"/>
  <ellipse cx="226" cy="238" rx="12" ry="10" fill="#1c0e08"/>
  <ellipse cx="226" cy="238" rx="7.5" ry="7.5" fill="#060408"/>
  <circle cx="230" cy="235" r="2.5" fill="white" opacity="0.75"/>
  <!-- right eye -->
  <ellipse cx="286" cy="238" rx="17" ry="10.5" fill="#e8e0d8"/>
  <ellipse cx="286" cy="238" rx="12" ry="10" fill="#1c0e08"/>
  <ellipse cx="286" cy="238" rx="7.5" ry="7.5" fill="#060408"/>
  <circle cx="290" cy="235" r="2.5" fill="white" opacity="0.75"/>
  <!-- eyelashes (top) -->
  <path d="M 209 230 Q 226 223 243 229" stroke="#060408" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 269 229 Q 286 223 303 230" stroke="#060408" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- nose (more prominent for male) -->
  <path d="M 252 256 L 250 282 Q 256 288 262 282 L 260 256 Z" fill="rgba(0,0,0,0.06)"/>
  <ellipse cx="247" cy="282" rx="6" ry="4.5" fill="rgba(0,0,0,0.14)"/>
  <ellipse cx="265" cy="282" rx="6" ry="4.5" fill="rgba(0,0,0,0.14)"/>
  <!-- mouth (closed, subtle masculine) -->
  <path d="M 236 305 Q 256 316 276 305" stroke="#9c5c38" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- stubble/beard shadow -->
  <path d="M 178 278 Q 182 318 200 336 Q 228 350 256 351 Q 284 350 312 336 Q 330 318 334 278 Q 310 300 256 302 Q 202 300 178 278 Z" fill="rgba(0,0,0,0.10)"/>
</svg>
