  <path d="M 137 238 C 110 298 114 382 142 425 Q 192 450 256 452 Q 320 450 370 425 C 398 382 402 298 375 238 C 342 218 300 210 256 210 C 212 210 170 218 137 238 Z" fill="url(#hijab-r)"/>
