<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-r" cx="44%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#2a3020"/>
      <stop offset="55%" stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#080e18"/>
    </radialGradient>
    <radialGradient id="skin-r" cx="48%" cy="42%" r="56%">
      <stop offset="0%" stop-color="#d8a87a"/>
      <stop offset="100%" stop-color="#b07a48"/>
    </radialGradient>
    <linearGradient id="body-r" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2030"/>
      <stop offset="100%" stop-color="#0a1020"/>
