    <linearGradient id="hijab-r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1a10"/>
      <stop offset="100%" stop-color="#0e1020"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg-r)"/>
  <!-- warm amber ambient from top -->
  <ellipse cx="190" cy="110" rx="310" ry="210" fill="rgba(245,158,11,0.07)"/>
